name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_IP: ${{ vars.SERVER_IP }}
        run: |
          mkdir -p ~/.ssh
          echo "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          SERVER_IP: ${{ vars.SERVER_IP }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key root@${SERVER_IP}"
          SCP="scp -i ~/.ssh/deploy_key -r"

          # Clean old app files (but preserve .venv, diary.db, backups)
          $SSH "find /opt/diary -maxdepth 1 -not -name diary -not -name .venv -not -name diary.db -not -name backups -not -name .env | tail -n +2 | xargs rm -rf"

          # Copy project files
          $SCP app pyproject.toml seed.py backup.sh diary-backup.service diary-backup.timer CLAUDE.md "root@${SERVER_IP}:/opt/diary/"

          # Recreate venv if broken, install deps, restart
          $SSH "cd /opt/diary && \
            [ -x .venv/bin/pip ] || (rm -rf .venv && python3 -m venv .venv) && \
            .venv/bin/pip install -e . --quiet && \
            systemctl restart diary"
