name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Pinned to a commit SHA (not a mutable tag) so a retagged/compromised
      # action can't run with access to the SSH deploy secret.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup SSH
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_IP: ${{ vars.SERVER_IP }}
          SERVER_HOST_KEY: ${{ secrets.SERVER_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if [ -n "$SERVER_HOST_KEY" ]; then
            # Pin the server host key (set the SERVER_HOST_KEY secret to the
            # output of `ssh-keyscan <SERVER_IP>`) so a MITM at deploy time is
            # rejected instead of silently trusted.
            printf '%s\n' "$SERVER_HOST_KEY" > ~/.ssh/known_hosts
          else
            echo "::warning::SERVER_HOST_KEY secret not set — falling back to trust-on-first-use ssh-keyscan"
            ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts
          fi

      - name: Deploy
        env:
          SERVER_IP: ${{ vars.SERVER_IP }}
          # Set a DEPLOY_USER repo variable (e.g. "diary") to deploy as an
          # unprivileged user; defaults to root to preserve existing behavior.
          DEPLOY_USER: ${{ vars.DEPLOY_USER || 'root' }}
        run: |
          SSH="ssh -o StrictHostKeyChecking=yes -i ~/.ssh/deploy_key ${DEPLOY_USER}@${SERVER_IP}"
          SCP="scp -o StrictHostKeyChecking=yes -i ~/.ssh/deploy_key -r"

          # Non-root deploy user restarts the service via a scoped sudo rule.
          SUDO=""; [ "$DEPLOY_USER" != "root" ] && SUDO="sudo"

          # Clean old app files (preserve .venv, diary.db, backups, .env).
          # -mindepth 1 keeps /opt/diary itself; -print0 | xargs -0 handles odd names.
          $SSH "find /opt/diary -mindepth 1 -maxdepth 1 \
            -not -name .venv -not -name diary.db -not -name backups -not -name .env \
            -print0 | xargs -0 -r rm -rf"

          # Copy project files
          $SCP app pyproject.toml seed.py backup.sh diary-backup.service diary-backup.timer CLAUDE.md "${DEPLOY_USER}@${SERVER_IP}:/opt/diary/"

          # Recreate venv if broken, install deps, restart
          $SSH "cd /opt/diary && \
            [ -x .venv/bin/pip ] || (rm -rf .venv && python3 -m venv .venv) && \
            .venv/bin/pip install -e . --quiet && \
            ${SUDO} systemctl restart diary"
