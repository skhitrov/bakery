name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_IP: ${{ vars.SERVER_IP }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq rsync > /dev/null
          mkdir -p ~/.ssh
          echo "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts

          rsync -azv --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --filter='P .venv' \
            --exclude='.git' \
            --exclude='diary.db' \
            --exclude='__pycache__' \
            --exclude='.env' \
            --exclude='backups' \
            ./ "root@${SERVER_IP}:/opt/diary/"

          ssh -i ~/.ssh/deploy_key "root@${SERVER_IP}" "\
            cd /opt/diary && \
            rm -rf .venv && \
            python3 -m venv .venv && \
            .venv/bin/pip install -e . --quiet && \
            systemctl restart diary"
